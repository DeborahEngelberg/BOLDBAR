<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BOLD — Caffeinated Protein Bar</title>
<link rel="stylesheet" href="assets/styles.css"/>
<style>
  /* Font families are aliased: 'Ciron' + 'Jaune' names kept so existing components still resolve,
     but point at Neue Haas Grotesk (new brand type). */
  @font-face { font-family: 'Ciron'; src: url('assets/fonts/NeueHaasDisplayBlack.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: block; }
  @font-face { font-family: 'Ciron'; src: url('assets/fonts/NeueHaasDisplayBlackItalic.ttf') format('truetype'); font-weight: 700; font-style: italic; font-display: block; }
  @font-face { font-family: 'Jaune'; src: url('assets/fonts/NeueHaasGrotText-75Bold-Trial.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: block; }
  @font-face { font-family: 'NeueHaas'; src: url('assets/fonts/NeueHaasGrotText-55Roman-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: 'NeueHaas'; src: url('assets/fonts/NeueHaasGrotText-75Bold-Trial.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="assets/flavors.jsx?v=5"></script>
<script type="text/babel" src="assets/ShopifyHelpers.jsx?v=5"></script>
<script type="text/babel" src="assets/Nav.jsx?v=5"></script>
<script type="text/babel" src="assets/Hero.jsx?v=5"></script>
<script type="text/babel" src="assets/BestSellers.jsx?v=5"></script>
<script type="text/babel" src="assets/Marquee.jsx?v=5"></script>
<script type="text/babel" src="assets/FuelEveryday.jsx?v=5"></script>
<script type="text/babel" src="assets/PinnedScroll.jsx?v=5"></script>
<script type="text/babel" src="assets/FlavorGrid.jsx?v=5"></script>
<script type="text/babel" src="assets/WhyBold.jsx?v=5"></script>
<script type="text/babel" src="assets/Inside.jsx?v=5"></script>
<script type="text/babel" src="assets/Reviews.jsx?v=5"></script>
<script type="text/babel" src="assets/Footer.jsx?v=5"></script>
<script type="text/babel" src="assets/CartTweaks.jsx?v=5"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "mega",
  "accentOverride": null,
  "typeScale": 120,
  "dark": false,
  "defaultFlavor": "mocha"
}/*EDITMODE-END*/;

function App() {
  const [activeId, setActiveId] = useState(TWEAK_DEFAULTS.defaultFlavor || 'mocha');
  const [cartOpen, setCartOpen] = useState(false);
  const [cart, setCart] = useState([]);
  const [editMode, setEditMode] = useState(false);
  const [config, setConfig] = useState(TWEAK_DEFAULTS);

  const flavor = useMemo(() => window.FLAVORS.find(f => f.id === activeId) || window.FLAVORS[0], [activeId]);

  // Apply flavor theme to :root
  useEffect(() => {
    const r = document.documentElement.style;
    if (config.dark) {
      r.setProperty('--paper', '#0e0a07');
      r.setProperty('--ink-text', '#f3ecdb');
    } else {
      r.setProperty('--paper', flavor.paper);
      r.setProperty('--ink-text', flavor.ink);
    }
    r.setProperty('--accent', config.accentOverride || flavor.accent);
    r.setProperty('--wrapper', flavor.wrapper);
    r.setProperty('--wrapper-2', flavor.wrapper2);
    document.body.style.fontSize = (config.typeScale / 100) + 'rem';
  }, [flavor, config]);

  // Edit mode wiring
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // IntersectionObserver for .reveal
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) e.target.classList.add('in');
      });
    }, {threshold: 0.12});
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, [activeId]);

  const addToCart = (f, qty = 1) => {
    setCart(prev => {
      const existing = prev.find(x => x.id === f.id);
      if (existing) return prev.map(x => x.id === f.id ? {...x, qty: x.qty + qty} : x);
      return [...prev, {id: f.id, name: f.name, img: f.img, wrapper: f.wrapper, price: f.price, sku: f.sku, variantId: f.variantId, qty}];
    });
    setCartOpen(true);
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  return (
    <>
      <Ticker/>
      <Nav onOpenCart={() => setCartOpen(true)} cartCount={cartCount}/>
      <Hero flavor={flavor} onAdd={addToCart}/>
      <BestSellers flavors={window.FLAVORS} onAdd={addToCart}/>
      <Marquee/>
      <FuelEveryday/>
      <FlavorGrid activeId={activeId} setActive={setActiveId} onAdd={addToCart}/>
      <WhyBold flavor={flavor}/>
      <ScrollStrip flavor={flavor}/>
      <Inside flavor={flavor}/>
      <Reviews/>
      <Subscribe/>
      <Footer/>
      <CartDrawer open={cartOpen} items={cart} setItems={setCart} onClose={() => setCartOpen(false)}/>
      <Tweaks on={editMode} config={config} setConfig={setConfig}/>
      <ProductSchema flavors={window.FLAVORS}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
